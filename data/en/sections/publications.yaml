publications:
- title: Zero-Shot Recognition of Test Tube Types by Automatically Collecting and Labeling RGB Data
  publishedIn:
    name: IEEE Robotics and Automation Letters (RA-L), presented at ICRA 2026
    date: 2026
    url: "#"
  authors:
  - name: Yu Tang
  - name: Weiwei Wan
  - name: Hao Chen
  - name: Masaki Matsushita
  - name: Jun Takahashi
  - name: Takeyuki Kotaka
  - name: Kensuke Harada
  paper:
    summary: This paper presents a zero-shot pipeline for automatically detecting and recognizing test tube types in laboratory racks. The proposed approach eliminates the need for manually prepared training datasets by combining rack slot occupation prediction, automatic segmentation, clustering, and labeling. A neural network predicts rack slot occupancy, while SAM2-based segmentation and HDBSCAN clustering enable automatic classification of test tube caps. The system incrementally builds a recognition library when encountering new tube types, enabling flexible robotic manipulation without explicit training data. Experiments using a RealSense D405 camera and a UFactory xArm Lite6 robot demonstrate robust performance in real-world laboratory environments.
    url: "https://ieeexplore.ieee.org/document/11067950"
  categories: ["robotics","computer-vision",]
  tags: ["Test Tube Detection", "Robotic Manipulation", "Deep Learning"]

